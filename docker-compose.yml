name: rust-stack

# Local development infrastructure for all services.
# Host connection examples:
# - auth-db:      postgres://admin:admin1234@localhost:5432/auth_service
# - users-db:     postgres://admin:admin1234@localhost:5433/users_service
# - products-db:  postgres://admin:admin1234@localhost:5434/products_service

services:
  auth-db:
    image: postgres:16-alpine
    container_name: rust-stack-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  users-db:
    image: postgres:16-alpine
    container_name: rust-stack-users-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5433:5432"
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d users_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  products-db:
    image: postgres:16-alpine
    container_name: rust-stack-products-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: products_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5434:5432"
    volumes:
      - products_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d products_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  messages-db:
    image: postgres:16-alpine
    container_name: rust-stack-messages-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: messages_service
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5435:5432"
    volumes:
      - messages_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d messages_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rust-stack-pgadmin
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
      users-db:
        condition: service_healthy
      products-db:
        condition: service_healthy
      messages-db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend

volumes:
  auth_db_data:
  users_db_data:
  products_db_data:
  pgadmin_data:
  messages_db_data:

networks:
  backend:
    driver: bridge
